name: CD

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      - name: Run tests
        run: npm test

      - name: Build backend
        run: npm run build --workspace=apps/backend

      - name: Build frontend
        run: npm run build --workspace=apps/frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.API_URL || 'http://localhost:4001/api' }}
          NEXT_PUBLIC_STRIPE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY || '' }}

      - name: Deploy (placeholder)
        run: echo "Add deployment step here - e.g., Deploy to Render/Fly.io/Vercel"
